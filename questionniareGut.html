<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gut Health Assessment | Svasth by Soumya</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="font-awesome-4.2.0/css/font-awesome.min.css">
  <link rel="icon" type="image/png" href="img/other4.png">
  <style>
    /* Specific styles for questionnaire functionality */
    .rating-scale {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
      gap: 10px;
    }

    .rating-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex: 1;
    }

    .rating-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      margin-bottom: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .rating-option:hover .rating-circle {
      transform: scale(1.1);
    }

    .rating-circle.selected {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(197, 154, 109, 0.4);
    }

    .rating-1 {
      background-color: #c59a6d;
      opacity: 0.6;
    }

    .rating-2 {
      background-color: #c59a6d;
      opacity: 0.7;
    }

    .rating-3 {
      background-color: #c59a6d;
      opacity: 0.8;
    }

    .rating-4 {
      background-color: #c59a6d;
      opacity: 0.9;
    }

    .rating-5 {
      background-color: #c59a6d;
      opacity: 1.0;
    }

    .progress-container {
      margin: 20px 0 40px;
      background: #f0f0f0;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .score-display {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #8a633d);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 10px 20px rgba(197, 154, 109, 0.3);
    }

    #total-score {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .category-text {
      font-size: 1rem;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <div id="nav-placeholder"></div>

  <!-- Page Header -->
  <header class="section"
    style="background: linear-gradient(rgba(55, 65, 81, 0.7), rgba(55, 65, 81, 0.7)), url('img/bg3.jpg') no-repeat center center/cover; padding: 140px 0 20px; color: white; text-align: center;">
    <div class="container fade-in">
      <h1 style="color: white; margin-bottom: 10px;">Gut Health Assessment</h1>
      <p style="font-size: 1.2rem; opacity: 0.9; max-width: 600px; margin: 0 auto;">
        Evaluate your digestive health based on your symptoms.
      </p>
    </div>
  </header>

  <!-- Questionnaire Section -->
  <section class="section">
    <div class="container">
      <div class="card" style="max-width: 800px; margin: 0 auto; padding: 40px;">

        <!-- Start Screen -->
        <div id="start-screen" style="text-align: center;">
          <h2 style="margin-bottom: 20px;">Ready to start?</h2>
          <p style="margin-bottom: 30px; color: var(--text-muted);">
            This questionnaire takes about 5 minutes. Please answer honestly for the most accurate results.
          </p>

          <div style="max-width: 400px; margin: 0 auto 20px;">
            <input type="text" id="user-name" class="form-control" placeholder="Enter your name" required
              style="margin-bottom: 15px;">
            <input type="text" id="user-contact" class="form-control" placeholder="Enter your email or phone number"
              required>
            <div class="error-message" id="name-error" style="color: #e74c3c; display: none; margin-top: 10px;">Please
              enter your details to continue.</div>
          </div>

          <button id="start-btn" class="btn btn-primary">Start Assessment</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" style="display: none;" id="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Question Container -->
        <div id="question-container" style="display: none;">
          <!-- Dynamic Content -->
        </div>

        <!-- Navigation Buttons -->
        <div class="text-center" style="margin-top: 30px; display: none;" id="nav-buttons">
          <button id="next-btn" class="btn btn-primary" style="display: none;">Next</button>
          <button id="submit-btn" class="btn btn-primary" style="display: none;">Submit Results</button>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/jquery.1.11.1.js"></script>
  <script>
    $(function () {
      $("#nav-placeholder").load("nav.html");
      $("#footer-placeholder").load("footer.html");
    });

    // --- ORIGINAL LOGIC PRESERVED ---

    const questions = [
      { id: 1, text: "Gassy?" },
      { id: 2, text: "Bloating?" },
      { id: 3, text: "Heaviness after meals?" },
      { id: 4, text: "Stomach pain?" },
      { id: 5, text: "Lethargy or feeling tired?" },
      { id: 6, text: "Brain fog?" },
      { id: 7, text: "Constipation (without laxative)?" },
      {
        id: 8,
        text: "How often do you poop?",
        isCustomScale: true,
        labels: [
          { emoji: "💩", text: "< 3 times/week" },
          { emoji: "💩💫", text: "Every other day" },
          { emoji: "💩✨", text: "Once a day" },
          { emoji: "💩💩", text: "Twice a day" },
          { emoji: "💩💩➕", text: "> 2 times/day" },
        ],
        values: [
          "Less than three times a week",
          "Once every other day",
          "Once a day",
          "Twice a day",
          "More than two times a day",
        ],
        scores: [1, 2, 5, 4, 3]
      },
      { id: 9, text: "Diarrhea?" },
      { id: 10, text: "Mucus in stool?" },
      { id: 11, text: "Undigested food in stool?" },
      { id: 12, text: "Bad breath?" },
      { id: 13, text: "Nausea?" },
      { id: 14, text: "Heartburn / Acid Reflux?" },
      { id: 15, text: "Burping?" },
      { id: 16, text: "Stomach noise?" },
      { id: 17, text: "Food sensitivities / allergies?" },
      { id: 18, text: "Skin issues (Acne, Eczema, etc.)?" },
      { id: 19, text: "Anxiety / Depression?" },
      { id: 20, text: "Joint pain?" },
      { id: 21, text: "Headaches / Migraines?" },
      { id: 22, text: "Sleep issues?" },
      { id: 23, text: "Sugar cravings?" },
      { id: 24, text: "Weight issues (Gain/Loss)?" },
      { id: 25, text: "Hormonal imbalances?" }
    ];

    let currentQuestion = 0;
    const answers = {};
    let userName = "";
    let userContact = "";

    function displayQuestion(index) {
      const question = questions[index];
      const progressPercentage = ((index + 1) / questions.length) * 100;
      document.getElementById("progress-bar").style.width = `${progressPercentage}%`;

      let html = `
        <div class="fade-in">
          <h3 style="text-align: center; margin-bottom: 30px;">${question.text}</h3>
      `;

      if (question.isCustomScale) {
        html += `<div class="rating-scale">`;
        question.labels.forEach((label, i) => {
          const isSelected = answers[question.id] === question.scores[i] ? "selected" : "";
          html += `
            <div class="rating-option" onclick="selectOption(${question.id}, ${question.scores[i]})">
              <div class="rating-circle rating-${i + 1} ${isSelected}" style="font-size: 1.5rem;">${label.emoji}</div>
              <div class="rating-label" style="font-size: 0.8rem; text-align: center;">${label.text}</div>
            </div>
          `;
        });
        html += `</div>`;
      } else {
        html += `
          <div class="rating-scale">
            <div class="rating-option" onclick="selectOption(${question.id}, 1)">
              <div class="rating-circle rating-1 ${answers[question.id] === 1 ? "selected" : ""}">1</div>
              <div class="rating-label">Never</div>
            </div>
            <div class="rating-option" onclick="selectOption(${question.id}, 2)">
              <div class="rating-circle rating-2 ${answers[question.id] === 2 ? "selected" : ""}">2</div>
              <div class="rating-label">Rarely</div>
            </div>
            <div class="rating-option" onclick="selectOption(${question.id}, 3)">
              <div class="rating-circle rating-3 ${answers[question.id] === 3 ? "selected" : ""}">3</div>
              <div class="rating-label">Sometimes</div>
            </div>
            <div class="rating-option" onclick="selectOption(${question.id}, 4)">
              <div class="rating-circle rating-4 ${answers[question.id] === 4 ? "selected" : ""}">4</div>
              <div class="rating-label">Often</div>
            </div>
            <div class="rating-option" onclick="selectOption(${question.id}, 5)">
              <div class="rating-circle rating-5 ${answers[question.id] === 5 ? "selected" : ""}">5</div>
              <div class="rating-label">Always</div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
      document.getElementById("question-container").innerHTML = html;

      document.getElementById("nav-buttons").style.display = "block";
      if (index === questions.length - 1) {
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("submit-btn").style.display = "inline-block";
      } else {
        document.getElementById("next-btn").style.display = "inline-block";
        document.getElementById("submit-btn").style.display = "none";
      }
    }

    window.selectOption = function (questionId, value) {
      answers[questionId] = value;
      displayQuestion(currentQuestion);

      setTimeout(() => {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          displayQuestion(currentQuestion);
        }
      }, 300);
    };

    document.getElementById("start-btn").addEventListener("click", () => {
      userName = document.getElementById("user-name").value.trim();
      userContact = document.getElementById("user-contact").value.trim();

      if (!userName || !userContact) {
        document.getElementById("name-error").style.display = "block";
        return;
      }

      document.getElementById("start-screen").style.display = "none";
      document.getElementById("progress-container").style.display = "block";
      document.getElementById("question-container").style.display = "block";
      displayQuestion(0);
    });

    document.getElementById("next-btn").addEventListener("click", () => {
      if (answers[questions[currentQuestion].id]) {
        currentQuestion++;
        displayQuestion(currentQuestion);
      } else {
        alert("Please select an option.");
      }
    });

    document.getElementById("submit-btn").addEventListener("click", calculateResults);

    function calculateResults() {
      if (!answers[questions[currentQuestion].id]) {
        alert("Please select an option.");
        return;
      }

      let totalScore = 0;
      let maxScore = questions.length * 5;

      for (let key in answers) {
        totalScore += answers[key];
      }

      let percentage = (totalScore / maxScore) * 100;
      let category = "";
      let message = "";

      if (percentage <= 20) {
        category = "Excellent";
        message = "Your gut health seems to be in great shape! Keep up your healthy lifestyle.";
      } else if (percentage <= 40) {
        category = "Good";
        message = "Your gut health is good, but there's room for improvement. Pay attention to your diet and stress levels.";
      } else if (percentage <= 60) {
        category = "Fair";
        message = "You are experiencing some gut issues. It might be time to look at your diet and lifestyle more closely.";
      } else if (percentage <= 80) {
        category = "Poor";
        message = "Your gut health needs attention. You are experiencing significant symptoms that shouldn't be ignored.";
      } else {
        category = "Very Poor";
        message = "Your gut health is severely compromised. We highly recommend consulting with a specialist.";
      }

      const resultsHtml = `
        <div class="fade-in text-center">
          <h2 style="margin-bottom: 30px;">Assessment Complete</h2>
          
          <div class="score-display">
            <div id="total-score">${Math.round(percentage)}%</div>
            <div class="category-text">${category}</div>
          </div>

          <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: left;">
            <h3 style="color: var(--primary); margin-bottom: 15px;">Analysis</h3>
            <p>${message}</p>
          </div>

          <div class="alert-info" style="text-align: left;">
            <h3>Next Steps</h3>
            <p>Thank you, <strong>${userName}</strong>, for completing the assessment.</p>
            <p>Based on your score, we recommend booking a consultation to discuss a personalized plan.</p>
            <a href="https://wa.me/message/U43IYBJMJDQAD1" class="btn btn-primary" style="margin-top: 10px;">Book Consultation</a>
          </div>
        </div>
      `;

      document.getElementById("question-container").innerHTML = resultsHtml;
      document.getElementById("nav-buttons").style.display = "none";
      document.getElementById("progress-container").style.display = "none";
      
      sendReportToGoogleSheets(percentage, category);
    }

    function sendReportToGoogleSheets(percentage, category) {
      const highSymptoms = questions
        .filter(q => answers[q.id] && answers[q.id] >= 4)
        .map(q => q.text)
        .join(", ");

      const now = new Date();
      const formattedTimestamp = now.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });

      const data = {
        sheetName: "Sheet1",
        name: userName,
        contact: userContact,
        score: Math.round(percentage),
        category: category,
        highSymptoms: highSymptoms,
        timestamp: formattedTimestamp
      };

      questions.forEach((q) => {
        if (answers[q.id]) data[`Q${q.id}`] = answers[q.id];
      });

      const iframe = document.createElement("iframe");
      iframe.style.display = "none";
      document.body.appendChild(iframe);
      const form = document.createElement("form");
      form.method = "POST";
      form.action = "https://script.google.com/macros/s/AKfycbzWpa98yHvCTYfp0aiOrScOgGhXxZ5EXR6v2cSUtTnhEQpj9fzYhyOWlIacKgxA53vGBA/exec";
      for (const [key, value] of Object.entries(data)) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = value;
        form.appendChild(input);
      }
      iframe.contentDocument.body.appendChild(form);
      form.submit();
      
      setTimeout(() => {
        document.body.removeChild(iframe);
      }, 5000);
    }
  </script>
</body>

</html>
